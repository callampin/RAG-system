version: '3.8'

services:
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-customer-support
    ports:
      - "8501:8501"
    volumes:
      - ./data/pdfs:/app/data/pdfs
      - ./vectorstore:/app/vectorstore
      - ./.env:/app/.env:ro
    environment:
      - ACTIVE_LLM=${ACTIVE_LLM:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_GROUP_ID=${MINIMAX_GROUP_ID}
      - CHROMA_PERSIST_DIR=/app/vectorstore
      - DATA_PATH=/app/data/pdfs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3

  rag-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-ingest
    volumes:
      - ./data/pdfs:/app/data/pdfs
      - ./vectorstore:/app/vectorstore
      - ./.env:/app/.env:ro
    environment:
      - ACTIVE_LLM=${ACTIVE_LLM:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_GROUP_ID=${MINIMAX_GROUP_ID}
      - CHROMA_PERSIST_DIR=/app/vectorstore
      - DATA_PATH=/app/data/pdfs
    command: python -m src.ingest
    profiles:
      - ingest
    restart: "no"
